openapi: 3.0.3

info:
  title: DummyJSON API (Products & Users)
  description: Demo API documentation for both Products and Users generated from DummyJSON.
  version: 1.0.0

servers:
  - url: https://dummyjson.com

tags:
  - name: Products
    description: Product operations
  - name: Users
    description: User operations

paths:
  # --- PRODUCTS ENDPOINTS ---
  /products/1:
    get:
      tags:
        - Products
      summary: Get product by ID
      description: Returns the details of a single product with ID 1.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'

  # --- USERS ENDPOINTS ---
  /users:
    get:
      tags:
        - Users
      summary: Get all users
      description: Returns a paginated list of users.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'

  /users/{id}:
    get:
      tags:
        - Users
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: User not found

components:
  schemas:
    # --- PRODUCT SCHEMAS ---
    Product:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: "Essence Mascara Lash Princess"
        description:
          type: string
          example: "The Essence Mascara Lash Princess Volume Mascara features a unique cobra-shaped brush."
        category:
          type: string
          example: "beauty"
        price:
          type: number
          format: float
          example: 9.99
        discountPercentage:
          type: number
          format: float
          example: 7.17
        rating:
          type: number
          format: float
          example: 4.94
        stock:
          type: integer
          example: 5
        brand:
          type: string
          example: "Essence"
        availabilityStatus:
          type: string
          example: "Low Stock"

    # --- USER SCHEMAS ---
    UserListResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/User'
        total:
          type: integer
          example: 100
        skip:
          type: integer
          example: 0
        limit:
          type: integer
          example: 30

    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        firstName:
          type: string
          example: Emily
        lastName:
          type: string
          example: Johnson
        maidenName:
          type: string
          example: Smith
        age:
          type: integer
          example: 28
        gender:
          type: string
          example: female
        email:
          type: string
          format: email
          example: emily.johnson@x.dummyjson.com
        phone:
          type: string
          example: "+1 555-123-4567"
        username:
          type: string
          example: emilys
        birthDate:
          type: string
          format: date
          example: "1996-05-30"
        image:
          type: string
          format: uri
          example: "https://dummyjson.com/api-assets/users/container/1.png"