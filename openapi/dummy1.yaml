```yaml
openapi: 3.0.3

info:
  title: Demo Commerce API
  version: 1.0.0
  description: |
    Sample e-commerce API featuring authentication, users,
    products, and shopping carts.

servers:
  - url: https://dummyjson.com
    description: Production

tags:
  - name: Auth
  - name: Users
  - name: Products
  - name: Carts

paths:
  /auth/login:
    post:
      tags:
        - Auth
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /users:
    get:
      tags:
        - Users
      summary: Get all users
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
        - in: query
          name: skip
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: User list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserList'

  /users/{id}:
    get:
      tags:
        - Users
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: User not found

  /products:
    get:
      tags:
        - Products
      summary: Get products
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: skip
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Product list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductList'

  /products/{id}:
    get:
      tags:
        - Products
      summary: Get product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Product details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'

  /products/search:
    get:
      tags:
        - Products
      summary: Search products
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Search result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductList'

  /carts:
    get:
      tags:
        - Carts
      summary: Get carts
      responses:
        '200':
          description: Cart list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartList'

  /carts/{id}:
    get:
      tags:
        - Carts
      summary: Get cart by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Cart details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: emilys
        password:
          type: string
          example: emilyspass

    AuthResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        username:
          type: string
          example: emilys
        email:
          type: string
          example: emily@example.com
        token:
          type: string
          example: eyJhbGciOi...

    User:
      type: object
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
        age:
          type: integer
        image:
          type: string
          format: uri

    UserList:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/User'
        total:
          type: integer
        skip:
          type: integer
        limit:
          type: integer

    Product:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        category:
          type: string
        brand:
          type: string
        price:
          type: number
          format: float
        discountPercentage:
          type: number
          format: float
        rating:
          type: number
          format: float
        stock:
          type: integer
        thumbnail:
          type: string
          format: uri

    ProductList:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: '#/components/schemas/Product'
        total:
          type: integer
        skip:
          type: integer
        limit:
          type: integer

    CartProduct:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        price:
          type: number
        quantity:
          type: integer
        total:
          type: number

    Cart:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        total:
          type: number
        discountedTotal:
          type: number
        totalProducts:
          type: integer
        totalQuantity:
          type: integer
        products:
          type: array
          items:
            $ref: '#/components/schemas/CartProduct'

    CartList:
      type: object
      properties:
        carts:
          type: array
          items:
            $ref: '#/components/schemas/Cart'
        total:
          type: integer
        skip:
          type: integer
        limit:
          type: integer
```
