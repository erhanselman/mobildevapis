openapi: 3.0.3

info:
  title: DummyJSON Users API (Protected)
  description: Demo API documentation generated from DummyJSON with Bearer Token Auth.
  version: 1.0.0

servers:
  - url: https://dummyjson.com

tags:
  - name: Users
    description: User operations

# Global olarak tüm API'yi korumak istersen burayı açabilirsin:
# security:
#   - BearerAuth: []

paths:
  /users:
    get:
      tags:
        - Users
      summary: Get all users
      description: Returns a paginated list of users. Requires authentication.
      security:
        - BearerAuth: [] # Sadece bu endpoint'i Bearer ile korur
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '401':
          description: Unauthorized - Geçersiz veya eksik token.

  /users/{id}:
    get:
      tags:
        - Users
      summary: Get user by ID
      description: Returns a single user by ID. Requires authentication.
      security:
        - BearerAuth: [] # Sadece bu endpoint'i Bearer ile korur
      parameters:
        - name: id
          in: path
          required: true
          description: User ID
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized - Geçersiz veya eksik token.
        '404':
          description: User not found

components:
  # --- GÜVENLİK TANIMLAMASI ---
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Lütfen "Bearer <token>" şeklinde JWT tokeninizi girin.

  # --- ŞEMALAR ---
  schemas:
    UserListResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/User'
        total:
          type: integer
          example: 100
        skip:
          type: integer
          example: 0
        limit:
          type: integer
          example: 30

    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        firstName:
          type: string
          example: Emily
        lastName:
          type: string
          example: Johnson
        maidenName:
          type: string
          example: Smith
        age:
          type: integer
          example: 28
        gender:
          type: string
          example: female
        email:
          type: string
          format: email
          example: emily.johnson@x.dummyjson.com
        phone:
          type: string
          example: "+1 555-123-4567"
        username:
          type: string
          example: emilys
        birthDate:
          type: string
          format: date
          example: "1996-05-30"
        image:
          type: string
          format: uri
          example: "https://dummyjson.com/api-assets/users/container/1.png"